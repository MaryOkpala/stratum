---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  become: yes

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: yes

- name: Deploy Nginx reverse proxy config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/stratum
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart nginx

- name: Enable Stratum site
  file:
    src: /etc/nginx/sites-available/stratum
    dest: /etc/nginx/sites-enabled/stratum
    state: link
  become: yes
  notify: restart nginx

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes
  become: yes

- name: Verify Nginx config is valid
  command: nginx -t
  become: yes
  changed_when: false
